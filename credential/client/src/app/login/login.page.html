<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form
    [formRoot]="loginForm"
    (keyup.enter)="loginForm().valid() && login()"
    (submit)="loginForm().valid() && login()"
    novalidate
  >
    <ion-list>
      <ion-item>
        <ion-input
          [required]="true"
          autocomplete="username"
          label="Username"
          labelPlacement="stacked"
          [formField]="loginForm.username"
          type="text"
        />
      </ion-item>

      <ion-item>
        <ion-input
          [required]="true"
          autocomplete="current-password"
          label="Password"
          labelPlacement="stacked"
          [formField]="loginForm.password"
          type="password"
        />
      </ion-item>

      <div class="ion-padding">
        <ion-button [disabled]="!loginForm().valid()" color="primary" expand="block" type="submit"
          >Login</ion-button
        >
      </div>

      <div class="ion-padding" style="margin-top: 50px">
        <ion-button [routerLink]="['/home']" color="secondary" expand="block"
          >Navigate to Home</ion-button
        >
      </div>
    </ion-list>
  </form>
</ion-content>
